<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T-Rex Run</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0a0a14;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }
    #wrapper {
      position: relative;
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
    }
    canvas { width: 100%; height: 100%; display: block; }
    #hud {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.5% 3%;
      color: #fff; font-size: 1.4vw; letter-spacing: 2px;
      pointer-events: none;
    }
    #hud span { color: #e94560; font-weight: bold; }
    #hud h1 { font-size: 1.6vw; letter-spacing: 6px; color: #e94560; text-transform: uppercase; }
    #msg {
      position: absolute; bottom: 2%; left: 50%; transform: translateX(-50%);
      font-size: 1vw; color: #333; letter-spacing: 2px; pointer-events: none;
    }
    #overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.5vh;
      background: #0a0a14cc;
    }
    #overlay h2 { font-size: 4vw; letter-spacing: 6px; }
    #overlay p { color: #aaa; font-size: 1.4vw; }
    #play-btn {
      margin-top: 1vh;
      padding: 1.2vh 4vw;
      background: #e94560; color: #fff;
      border: none; border-radius: 6px;
      font-size: 1.2vw; font-weight: bold; letter-spacing: 3px;
      cursor: pointer; text-transform: uppercase;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #play-btn:hover { transform: scale(1.05); box-shadow: 0 0 2vw #e9456088; }
  </style>
</head>
<body>
<div id="wrapper">
  <canvas id="c" width="960" height="540"></canvas>
  <div id="hud">
    <h1>T-Rex Run</h1>
    <div>Score: <span id="score">0</span> &nbsp;&nbsp; Best: <span id="best">0</span></div>
  </div>
  <div id="overlay">
    <h2 id="ol-title" style="color:#e94560">T-REX RUN</h2>
    <p id="ol-sub">Press Space or tap to jump</p>
    <button id="play-btn">PLAY</button>
  </div>
  <div id="msg">SPACE / TAP to jump · Double jump allowed</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const olTitle = document.getElementById('ol-title');
const olSub = document.getElementById('ol-sub');
const playBtn = document.getElementById('play-btn');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');

const W = canvas.width, H = canvas.height;
const GROUND = H - 80;
const GRAVITY = 0.7;
const JUMP_FORCE = -16;

let dino, obstacles, score, best, raf, running, speed, frameCount;
best = 0;

function resetDino() {
  return { x: 100, y: GROUND, w: 50, h: 64, vy: 0, jumps: 0, leg: 0 };
}

function init() {
  dino = resetDino();
  obstacles = [];
  score = 0; speed = 5; frameCount = 0;
  scoreEl.textContent = 0;
}

function spawnObstacle() {
  const h = 40 + Math.random() * 50;
  const w = 24 + Math.random() * 18;
  obstacles.push({ x: W + 30, y: GROUND - h + 64, w, h });
}

function jump() {
  if (!running) return;
  if (dino.jumps < 2) { dino.vy = JUMP_FORCE; dino.jumps++; }
}

function drawBg() {
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0d0d2b');
  bg.addColorStop(1, '#1a0a1e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // stars
  ctx.fillStyle = '#ffffff18';
  for (let i = 0; i < 60; i++) {
    const x = (i * 137 + frameCount * 0.15) % W;
    const y = (i * 83) % (GROUND - 20);
    ctx.beginPath();
    ctx.arc(x, y, i % 3 === 0 ? 1.5 : 1, 0, Math.PI * 2);
    ctx.fill();
  }

  // ground line
  ctx.save();
  ctx.strokeStyle = '#e9456055';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GROUND + 64); ctx.lineTo(W, GROUND + 64); ctx.stroke();
  ctx.restore();
}

function drawDino(d) {
  ctx.save();
  const grd = ctx.createLinearGradient(d.x, d.y - d.h, d.x, d.y);
  grd.addColorStop(0, '#00d4ff');
  grd.addColorStop(1, '#0077cc');
  ctx.fillStyle = grd;
  ctx.shadowBlur = 16; ctx.shadowColor = '#00d4ff';

  ctx.beginPath();
  ctx.roundRect(d.x, d.y - d.h + 18, d.w, d.h - 18, 10);
  ctx.fill();

  ctx.beginPath();
  ctx.roundRect(d.x + d.w - 22, d.y - d.h, 30, 26, 8);
  ctx.fill();

  ctx.fillStyle = '#fff'; ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.arc(d.x + d.w + 4, d.y - d.h + 9, 5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#0a0a1a';
  ctx.beginPath(); ctx.arc(d.x + d.w + 5, d.y - d.h + 9, 2.5, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#0077cc';
  const lo = d.jumps === 0 ? Math.sin(d.leg) * 8 : 0;
  ctx.beginPath(); ctx.roundRect(d.x + 6, d.y - 18, 13, 18 + lo, 4); ctx.fill();
  ctx.beginPath(); ctx.roundRect(d.x + 26, d.y - 18, 13, 18 - lo, 4); ctx.fill();
  ctx.restore();
}

function drawCactus(o) {
  ctx.save();
  const grd = ctx.createLinearGradient(o.x, o.y, o.x, o.y + o.h);
  grd.addColorStop(0, '#ff6b35');
  grd.addColorStop(1, '#c0392b');
  ctx.fillStyle = grd;
  ctx.shadowBlur = 14; ctx.shadowColor = '#ff6b35';
  ctx.beginPath(); ctx.roundRect(o.x, o.y, o.w, o.h, 5); ctx.fill();
  ctx.beginPath(); ctx.roundRect(o.x - 12, o.y + o.h * 0.3, 12, o.h * 0.25, 4); ctx.fill();
  ctx.beginPath(); ctx.roundRect(o.x + o.w, o.y + o.h * 0.45, 12, o.h * 0.2, 4); ctx.fill();
  ctx.restore();
}

function checkCollision(d, o) {
  const pad = 8;
  return (
    d.x + pad < o.x + o.w &&
    d.x + d.w - pad > o.x + pad &&
    d.y - d.h + pad < o.y + o.h &&
    d.y > o.y + pad
  );
}

function gameLoop() {
  if (!running) return;
  frameCount++;
  ctx.clearRect(0, 0, W, H);
  drawBg();

  dino.vy += GRAVITY;
  dino.y += dino.vy;
  if (dino.y >= GROUND) { dino.y = GROUND; dino.vy = 0; dino.jumps = 0; }
  if (dino.jumps === 0) dino.leg += 0.25;

  speed += 0.001;
  const gap = Math.max(55, 110 - score * 3);
  if (frameCount % gap === 0) spawnObstacle();

  obstacles = obstacles.filter(o => o.x + o.w > 0);
  for (const o of obstacles) {
    o.x -= speed;
    drawCactus(o);
    if (checkCollision(dino, o)) return gameOver();
  }

  drawDino(dino);

  if (frameCount % 10 === 0) {
    score++;
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }
    if (score >= 10) return win();
  }

  raf = requestAnimationFrame(gameLoop);
}

function gameOver() {
  running = false; cancelAnimationFrame(raf);
  olTitle.textContent = 'GAME OVER'; olTitle.style.color = '#e94560';
  olSub.textContent = `Score: ${score} — reach 10 to win!`; olSub.style.color = '#e94560';
  playBtn.textContent = 'TRY AGAIN'; playBtn.style.background = '#e94560';
  playBtn.style.fontSize = ''; playBtn.style.letterSpacing = '';
  playBtn.style.cursor = 'pointer'; playBtn.onclick = startGame;
  overlay.style.display = 'flex';
}

function win() {
  running = false; cancelAnimationFrame(raf);
  olTitle.textContent = '🎉 YOU WIN!'; olTitle.style.color = '#00d4ff';
  olSub.textContent = 'The code is:'; olSub.style.color = '#00d4ff';
  playBtn.textContent = 'tyhgi';
  playBtn.style.background = '#00d4ff'; playBtn.style.color = '#0a0a1a';
  playBtn.style.fontSize = '2.5vw'; playBtn.style.letterSpacing = '8px';
  playBtn.style.cursor = 'default'; playBtn.onclick = null;
  overlay.style.display = 'flex';
}

function startGame() {
  overlay.style.display = 'none';
  olTitle.style.color = '#e94560'; olSub.style.color = '#aaa';
  playBtn.style.background = '#e94560'; playBtn.style.color = '#fff';
  playBtn.style.fontSize = ''; playBtn.style.letterSpacing = '';
  playBtn.style.cursor = 'pointer'; playBtn.onclick = startGame;
  init(); running = true; raf = requestAnimationFrame(gameLoop);
}

playBtn.addEventListener('click', startGame);
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); jump(); }
  if (e.key === 'Enter' && !running) startGame();
});
canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); });
</script>
</body>
</html>
