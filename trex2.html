<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Run! T-Rex Chase</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; background:#f7f7f7; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    #wrapper { width:min(100vw,calc(100vh*16/9)); height:min(100vh,calc(100vw*9/16)); }
    canvas { width:100%; height:100%; display:block; image-rendering:pixelated; image-rendering:crisp-edges; }
  </style>
</head>
<body>
<div id="wrapper"><canvas id="c" width="960" height="540"></canvas></div>
<script>
const W=960, H=540;
const GROUND=390;
const P=5;
const BG='#f7f7f7';
const INK='#535353';
const CLR='#c5c5c5';

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;

const CM={
  ' ':null, 'X':INK,
  'H':'#c8640a', 'F':'#fbd4a4', 'P':'#ff69b4', 'Z':'#553322', 'K':'#333333'
};

// ── Girl sprite (8 wide × 11 tall) ───────────────────────────────────────────
const GS_BODY=[
  ' HHHH   ',
  'HHHHHHH ',
  'HFFFFHH ',
  ' FFFFF  ',
  ' FKFFF  ',
  ' FFFFF  ',
  '  PPPP  ',
  ' PPPPPP ',
  ' PPPPPP ',
];
const GS_STILL=[' FF FF  ',' ZZ ZZ  '];
const GS_RUN1 =[' FFFF   ',' ZZZZ   '];
const GS_RUN2 =['   FFFF ','   ZZZZ '];

// ── T-Rex sprite (12 wide × 10 tall) ─────────────────────────────────────────
const TX_BODY=[
  '    XXXXX   ',
  '   XXXXXXXX ',
  '   X XXXXXX ',
  '   XXXXXXXX ',
  'XXXXXXXXXX  ',
  'XXXXXXXXXXX ',
  ' XXXXXXXXX  ',
  '  XXXXXXX   ',
];
const TX_STILL=['  XX  XX    ','  XX  XX    '];
const TX_RUN1 =['  XXXXX     ','    XX      '];
const TX_RUN2 =['     XXXXX  ','      XX    '];

// ── Cacti ─────────────────────────────────────────────────────────────────────
const SP_CACT_S=[
  '  X  ',' XXX ','XXXXX',' XXX ',' XXX ',' XXX ',' XXX ',' XXX ',
];
const SP_CACT_L=[
  '  X X   ',' XXXXXX ','XXXXXXXX',' XXXXXX ','  XXXX  ','  XXXX  ','  XXXX  ','  XXXX  ','  XXXX  ','  XXXX  ',
];

// ── Clouds ────────────────────────────────────────────────────────────────────
const SP_CLOUD=['  XXX   ',' XXXXX  ','XXXXXXXX',' XXXXX  '];
const CLD_W=SP_CLOUD[0].length*P;
const CLOUDS=Array.from({length:5},(_,i)=>({
  x:i*220, y:40+Math.round(Math.random()*90), spd:0.3+Math.random()*0.35
}));

// ── Ground bumps ──────────────────────────────────────────────────────────────
const TILE_W=W*2;
const BUMPS=Array.from({length:80},()=>({
  ox:Math.random()*TILE_W, h:Math.floor(Math.random()*2)+1, w:Math.random()>0.5?P:P*2
}));

const GIRL_W=8*P, GIRL_H=11*P;
const TREX_W=12*P, TREX_H=10*P;

function blit(rows, ox, oy, override) {
  rows.forEach((row,r)=>{
    for(let c=0;c<row.length;c++){
      if(row[c]===' ') continue;
      ctx.fillStyle=override||(CM[row[c]]||INK);
      ctx.fillRect(Math.round(ox+c*P),Math.round(oy+r*P),P,P);
    }
  });
}

function drawGirl(g, lf) {
  const legs=lf===1?GS_RUN1:lf===2?GS_RUN2:GS_STILL;
  blit([...GS_BODY,...legs], g.x, g.y-GIRL_H);
}

function drawTRex(x, y, lf) {
  const legs=lf===1?TX_RUN1:lf===2?TX_RUN2:TX_STILL;
  blit([...TX_BODY,...legs], x, y-TREX_H);
}

function drawGround(off) {
  ctx.fillStyle=INK; ctx.fillRect(0,GROUND,W,2);
  BUMPS.forEach(b=>{
    const x=((b.ox-off%TILE_W)%TILE_W+TILE_W)%TILE_W;
    if(x<W+b.w) ctx.fillRect(Math.round(x),GROUND+3,b.w,b.h*2);
  });
}

function drawClouds() {
  CLOUDS.forEach(c=>{
    blit(SP_CLOUD,Math.round(c.x),c.y,CLR);
    c.x-=c.spd;
    if(c.x+CLD_W<0){c.x=W+30+Math.random()*120; c.y=40+Math.round(Math.random()*90);}
  });
}

function drawHUD(score, best) {
  ctx.fillStyle=INK; ctx.font='bold 18px monospace';
  ctx.textAlign='right'; ctx.textBaseline='top';
  ctx.fillText('HI '+String(best).padStart(5,'0')+'   '+String(score).padStart(5,'0'),W-20,18);
}

// ── Game ──────────────────────────────────────────────────────────────────────
let girl, obs, score, best=0, speed, fc, running, gState, raf;

function init() {
  girl={x:150,y:GROUND,vy:0,jumps:0};
  obs=[]; score=0; speed=5.5; fc=0; gState='play';
}

function jump() {
  if(gState!=='play'||girl.jumps>=2) return;
  girl.vy=-14; girl.jumps++;
}

function spawnObs() {
  const big=Math.random()>0.5;
  const sp=big?SP_CACT_L:SP_CACT_S;
  obs.push({x:W+20,sp,w:sp[0].length*P,h:sp.length*P});
}

function gameLoop() {
  if(!running) return;
  fc++;

  ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);
  drawClouds();
  drawGround(fc*speed);

  // Physics
  girl.vy+=0.85;
  girl.y=Math.min(girl.y+girl.vy,GROUND);
  if(girl.y===GROUND){girl.vy=0; girl.jumps=0;}
  speed+=0.003;

  // T-Rex chaser (gap shrinks as score grows)
  const gap=Math.max(100,200-score);
  const trexX=girl.x-gap;
  if(trexX>-TREX_W) drawTRex(trexX,GROUND,Math.floor(fc/6)%2+1);

  // Spawn obstacles
  if(fc===55||(fc>55&&(fc-55)%Math.max(45,70-score*3)===0)) spawnObs();

  // Move + draw obstacles + collision
  const PAD=P;
  for(let i=obs.length-1;i>=0;i--){
    const o=obs[i];
    o.x-=speed;
    if(o.x+o.w<0){obs.splice(i,1); continue;}
    blit(o.sp,o.x,GROUND-o.h);
    if(girl.x+PAD<o.x+o.w-PAD && girl.x+GIRL_W-PAD>o.x+PAD && girl.y>GROUND-o.h+PAD){
      return gameOver();
    }
  }

  // Draw girl on top
  drawGirl(girl, girl.y<GROUND?0:Math.floor(fc/6)%2+1);

  if(fc%10===0){
    score++;
    if(score>best) best=score;
    if(score>=100) return win();
  }

  drawHUD(score,best);

  // Danger warning
  if(gap<=130){
    ctx.fillStyle='rgba(200,0,0,0.75)';
    ctx.font='bold 14px monospace';
    ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText('T-REX GAINING!',20,20);
  }

  raf=requestAnimationFrame(gameLoop);
}

// ── Screens ───────────────────────────────────────────────────────────────────
function renderFreeze() {
  ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);
  drawClouds();
  drawGround(fc*speed);
  const gap=Math.max(100,200-score);
  const trexX=girl.x-gap;
  if(trexX>-TREX_W) drawTRex(trexX,GROUND,0);
  obs.forEach(o=>blit(o.sp,o.x,GROUND-o.h));
  drawGirl(girl,0);
  drawHUD(score,best);
}

function gameOver() {
  running=false; renderFreeze();
  ctx.fillStyle='rgba(247,247,247,0.85)';
  ctx.fillRect(0,170,W,210);
  ctx.fillStyle=INK;
  ctx.font='bold 42px monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('T-REX GOT YOU!',W/2,252);
  ctx.font='17px monospace';
  ctx.fillStyle='#888';
  ctx.fillText('reach score 100 to escape  •  SPACE or tap to retry',W/2,308);
  gState='over';
}

function win() {
  running=false; renderFreeze();
  ctx.fillStyle='rgba(247,247,247,0.94)';
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle=INK;
  ctx.font='bold 46px monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('YOU ESCAPED!',W/2,H/2-70);
  ctx.font='22px monospace';
  ctx.fillText('The code is:',W/2,H/2-5);
  ctx.font='bold 54px monospace';
  ctx.fillText('ygjdi',W/2,H/2+70);
  gState='won';
}

function drawStart() {
  ctx.fillStyle=BG; ctx.fillRect(0,0,W,H);
  drawClouds();
  drawGround(0);
  drawTRex(40,GROUND,1);
  drawGirl({x:165,y:GROUND},2);
  ctx.fillStyle=INK;
  ctx.font='20px monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('CLICK  or  TAP  to  start',W/2,H/2-20);
  ctx.fillStyle='#999';
  ctx.font='15px monospace';
  ctx.fillText('double jump to escape  •  reach score 100 to win',W/2,H/2+12);
}

function startGame() {
  cancelAnimationFrame(raf);
  init(); running=true;
  raf=requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){
    e.preventDefault();
    if(!running&&gState!=='won') startGame();
    else jump();
  }
});
function handleTap(){
  if(!running&&gState!=='won') startGame();
  else jump();
}
canvas.addEventListener('click',handleTap);
canvas.addEventListener('touchstart',e=>{e.preventDefault();handleTap();},{passive:false});

gState='start'; fc=0; speed=0;
drawStart();
</script>
</body>
</html>
