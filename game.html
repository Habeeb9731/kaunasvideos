<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0f0f1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }
    h1 { font-size: 2rem; letter-spacing: 6px; color: #00ffaa; margin-bottom: 8px; text-transform: uppercase; }
    #score-bar { display: flex; gap: 40px; margin-bottom: 16px; font-size: 1rem; color: #aaa; }
    #score-bar span { color: #00ffaa; font-weight: bold; }
    canvas {
      border: 2px solid #00ffaa33;
      border-radius: 8px;
      box-shadow: 0 0 40px #00ffaa22;
    }
    #msg {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #555;
      letter-spacing: 2px;
    }
    #overlay {
      position: absolute;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px;
    }
    #overlay h2 { font-size: 2.5rem; color: #00ffaa; letter-spacing: 4px; }
    #overlay p { color: #aaa; font-size: 1rem; }
    #play-btn {
      margin-top: 10px;
      padding: 12px 40px;
      background: #00ffaa;
      color: #0f0f1a;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 3px;
      cursor: pointer;
      text-transform: uppercase;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #play-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px #00ffaa88; }
  </style>
</head>
<body>
  <h1>Snake</h1>
  <div id="score-bar">Score: <span id="score">0</span> &nbsp; Best: <span id="best">0</span></div>
  <div style="position:relative">
    <canvas id="c" width="400" height="400"></canvas>
    <div id="overlay">
      <h2 id="ol-title">SNAKE</h2>
      <p id="ol-sub">Use arrow keys or WASD</p>
      <button id="play-btn">PLAY</button>
    </div>
  </div>
  <div id="msg">↑ ↓ ← →  or  W A S D</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const olTitle = document.getElementById('ol-title');
const olSub = document.getElementById('ol-sub');
const playBtn = document.getElementById('play-btn');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');

const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

let snake, dir, nextDir, food, score, best, loop, running;

best = 0;

function init() {
  snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  scoreEl.textContent = 0;
  spawnFood();
}

function spawnFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // grid dots
  ctx.fillStyle = '#ffffff08';
  for (let x = 0; x < COLS; x++)
    for (let y = 0; y < ROWS; y++) {
      ctx.beginPath();
      ctx.arc(x * GRID + GRID / 2, y * GRID + GRID / 2, 1, 0, Math.PI * 2);
      ctx.fill();
    }

  // food
  const fx = food.x * GRID + GRID / 2;
  const fy = food.y * GRID + GRID / 2;
  ctx.save();
  ctx.shadowBlur = 16;
  ctx.shadowColor = '#ff4466';
  ctx.fillStyle = '#ff4466';
  ctx.beginPath();
  ctx.arc(fx, fy, GRID / 2 - 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // snake
  snake.forEach((seg, i) => {
    const t = i / snake.length;
    const alpha = 1 - t * 0.5;
    ctx.save();
    ctx.shadowBlur = i === 0 ? 20 : 0;
    ctx.shadowColor = '#00ffaa';
    ctx.fillStyle = i === 0 ? `rgba(0,255,170,${alpha})` : `rgba(0,200,120,${alpha})`;
    const r = i === 0 ? GRID / 2 - 1 : GRID / 2 - 3;
    ctx.beginPath();
    ctx.roundRect(seg.x * GRID + 2, seg.y * GRID + 2, GRID - 4, GRID - 4, i === 0 ? 6 : 4);
    ctx.fill();
    ctx.restore();
  });
}

function step() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
  // self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    if (score > best) { best = score; bestEl.textContent = best; }
    spawnFood();
  } else {
    snake.pop();
  }

  draw();
}

function gameOver() {
  clearInterval(loop);
  running = false;
  olTitle.textContent = 'GAME OVER';
  olSub.textContent = `Score: ${score}`;
  playBtn.textContent = 'PLAY AGAIN';
  overlay.style.display = 'flex';

  // flash red
  ctx.save();
  ctx.fillStyle = '#ff446622';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.restore();
}

function startGame() {
  overlay.style.display = 'none';
  init();
  draw();
  running = true;
  loop = setInterval(step, 120);
}

playBtn.addEventListener('click', startGame);

document.addEventListener('keydown', e => {
  if (!running) { if (e.key === 'Enter') startGame(); return; }
  const map = {
    ArrowUp:    { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
    ArrowDown:  { x: 0, y:  1 }, s: { x: 0, y:  1 }, S: { x: 0, y:  1 },
    ArrowLeft:  { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
    ArrowRight: { x: 1,  y: 0 }, d: { x: 1,  y: 0 }, D: { x: 1,  y: 0 },
  };
  const nd = map[e.key];
  if (!nd) return;
  if (nd.x === -dir.x && nd.y === -dir.y) return; // no reverse
  nextDir = nd;
  e.preventDefault();
});

// mobile swipe
let tx, ty;
canvas.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; });
canvas.addEventListener('touchend', e => {
  if (!running) return;
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy)) {
    const nd = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
    if (!(nd.x === -dir.x)) nextDir = nd;
  } else {
    const nd = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
    if (!(nd.y === -dir.y)) nextDir = nd;
  }
});

draw();
</script>
</body>
</html>
