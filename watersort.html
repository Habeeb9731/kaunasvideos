<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Sort</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    #wrapper {
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
    }
    canvas { width: 100%; height: 100%; display: block; cursor: pointer; background: transparent; }
  </style>
</head>
<body>
<div id="wrapper">
  <canvas id="c" width="960" height="540"></canvas>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 960, H = 540;

const COLORS = { R: '#ff4466', B: '#4499ff', G: '#33ffaa', Y: '#ffdd33' };
const KEYS = ['R','B','G','Y'];
const CAP = 4;

const TUBE_W   = 66;
const SEG_H    = 66;
const TUBE_H   = SEG_H * CAP;   // 264
const TUBE_GAP = 32;
const N_TUBES  = 6;
const TOTAL_W  = N_TUBES * TUBE_W + (N_TUBES - 1) * TUBE_GAP;
const TX0      = Math.round((W - TOTAL_W) / 2);
const TUBE_TOP = 155;
const RIM_H    = 10;
const LIFT     = 24;

let tubes = [], selected = -1, history = [], gameState = 'game';

function tubeX(i) { return TX0 + i * (TUBE_W + TUBE_GAP); }

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}

function newGame() {
  const segs = [];
  KEYS.forEach(k => { for (let i = 0; i < CAP; i++) segs.push(k); });
  shuffle(segs);
  tubes = [];
  for (let i = 0; i < 4; i++) tubes.push(segs.slice(i * CAP, (i + 1) * CAP));
  tubes.push([], []);
  selected = -1; history = []; gameState = 'game';
  draw();
}

const topColor = t => t.length ? t[t.length - 1] : null;

function topRun(t) {
  if (!t.length) return 0;
  const c = topColor(t); let n = 0;
  for (let i = t.length - 1; i >= 0 && t[i] === c; i--) n++;
  return n;
}

function canPour(f, t) {
  if (f === t || !tubes[f].length || tubes[t].length >= CAP) return false;
  return !tubes[t].length || topColor(tubes[f]) === topColor(tubes[t]);
}

function pour(f, t) {
  history.push(tubes.map(x => [...x]));
  const amt = Math.min(CAP - tubes[t].length, topRun(tubes[f]));
  for (let i = 0; i < amt; i++) tubes[t].push(tubes[f].pop());
}

function isWon() {
  return tubes.every(t => !t.length || (t.length === CAP && t.every(c => c === t[0])));
}

function handleTubeClick(i) {
  if (gameState !== 'game') return;
  if (selected === -1) {
    if (!tubes[i].length) return;
    selected = i;
  } else if (selected === i) {
    selected = -1;
  } else if (canPour(selected, i)) {
    pour(selected, i);
    selected = -1;
    if (isWon()) gameState = 'won';
  } else {
    selected = tubes[i].length ? i : -1;
  }
  draw();
}

// ── Drawing ──────────────────────────────────────────────────────────────────

function tubePath(x, y) {
  const r = TUBE_W / 2;
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + TUBE_W, y);
  ctx.lineTo(x + TUBE_W, y + TUBE_H - r);
  ctx.arcTo(x + TUBE_W, y + TUBE_H, x + TUBE_W - r, y + TUBE_H, r);
  ctx.lineTo(x + r, y + TUBE_H);
  ctx.arcTo(x, y + TUBE_H, x, y + TUBE_H - r, r);
  ctx.lineTo(x, y);
  ctx.closePath();
}

function drawTube(i) {
  const tx = tubeX(i);
  const ty = TUBE_TOP - (selected === i ? LIFT : 0);
  const tube = tubes[i];
  const isSel = selected === i;
  const isDone = tube.length === CAP && tube.every(c => c === tube[0]);

  // ── Liquid + glass interior (clipped) ──
  ctx.save();
  tubePath(tx, ty);
  ctx.clip();

  // Glass base tint
  ctx.fillStyle = 'rgba(180,215,255,0.10)';
  ctx.fillRect(tx, ty, TUBE_W, TUBE_H);

  // Color segments with 3D cylindrical shading
  for (let s = 0; s < tube.length; s++) {
    const segY = ty + TUBE_H - (s + 1) * SEG_H;

    // Base color
    ctx.fillStyle = COLORS[tube[s]];
    ctx.fillRect(tx, segY, TUBE_W, SEG_H);

    // Cylindrical gradient: shadow on edges, highlight in center
    const cg = ctx.createLinearGradient(tx, 0, tx + TUBE_W, 0);
    cg.addColorStop(0,    'rgba(0,0,0,0.32)');
    cg.addColorStop(0.14, 'rgba(0,0,0,0.08)');
    cg.addColorStop(0.36, 'rgba(255,255,255,0.16)');
    cg.addColorStop(0.50, 'rgba(255,255,255,0.22)');
    cg.addColorStop(0.66, 'rgba(255,255,255,0.06)');
    cg.addColorStop(0.86, 'rgba(0,0,0,0.10)');
    cg.addColorStop(1,    'rgba(0,0,0,0.36)');
    ctx.fillStyle = cg;
    ctx.fillRect(tx, segY, TUBE_W, SEG_H);

    // Meniscus top highlight
    const mh = ctx.createLinearGradient(0, segY, 0, segY + 7);
    mh.addColorStop(0, 'rgba(255,255,255,0.32)');
    mh.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = mh;
    ctx.fillRect(tx + 3, segY, TUBE_W - 6, 7);
  }

  // Glass left highlight stripe
  const lh = ctx.createLinearGradient(tx, 0, tx + TUBE_W * 0.42, 0);
  lh.addColorStop(0,    'rgba(255,255,255,0.30)');
  lh.addColorStop(0.18, 'rgba(255,255,255,0.16)');
  lh.addColorStop(0.42, 'rgba(255,255,255,0.03)');
  lh.addColorStop(1,    'rgba(255,255,255,0)');
  ctx.fillStyle = lh;
  ctx.fillRect(tx, ty, TUBE_W, TUBE_H);

  // Glass right shadow
  const rs = ctx.createLinearGradient(tx + TUBE_W * 0.58, 0, tx + TUBE_W, 0);
  rs.addColorStop(0, 'rgba(0,0,0,0)');
  rs.addColorStop(1, 'rgba(0,0,0,0.26)');
  ctx.fillStyle = rs;
  ctx.fillRect(tx, ty, TUBE_W, TUBE_H);

  ctx.restore();

  // ── Tube border ──
  ctx.save();
  if (isDone) { ctx.shadowBlur = 20; ctx.shadowColor = COLORS[tube[0]]; }
  ctx.strokeStyle = isDone ? COLORS[tube[0]] + 'cc'
                  : isSel  ? 'rgba(255,255,255,0.90)'
                  :          'rgba(255,255,255,0.45)';
  ctx.lineWidth = 2;
  tubePath(tx, ty);
  ctx.stroke();
  ctx.restore();

  // ── Rim ──
  ctx.save();
  ctx.strokeStyle = isSel ? 'rgba(255,255,255,0.90)' : 'rgba(255,255,255,0.45)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(tx - 4, ty);
  ctx.lineTo(tx - 4, ty - RIM_H + 3);
  ctx.arcTo(tx - 4, ty - RIM_H, tx - 1, ty - RIM_H, 3);
  ctx.lineTo(tx + TUBE_W + 1, ty - RIM_H);
  ctx.arcTo(tx + TUBE_W + 4, ty - RIM_H, tx + TUBE_W + 4, ty - RIM_H + 3, 3);
  ctx.lineTo(tx + TUBE_W + 4, ty);
  ctx.stroke();
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Title with shadow so it reads on both light and dark backgrounds
  ctx.save();
  ctx.shadowColor = 'rgba(0,80,200,0.35)';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#44aaff';
  ctx.font = 'bold 26px "Segoe UI",sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('WATER  SORT', W / 2, 46);
  ctx.restore();

  for (let i = 0; i < tubes.length; i++) drawTube(i);

  if (gameState === 'won') {
    ctx.fillStyle = 'rgba(255,255,255,0.90)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#1a55cc';
    ctx.font = 'bold 42px "Segoe UI",sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🎉 YOU WIN!', W / 2, H / 2 - 50);

    ctx.font = '20px "Segoe UI",sans-serif';
    ctx.fillText('The code is:', W / 2, H / 2 + 10);

    ctx.font = 'bold 52px "Segoe UI",sans-serif';
    ctx.fillText('15', W / 2, H / 2 + 80);
  }
}

// ── Input ────────────────────────────────────────────────────────────────────

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width, sy = H / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - rect.left) * sx, y: (src.clientY - rect.top) * sy };
}

function onClick(x, y) {
  if (gameState === 'won') return;
  for (let i = 0; i < tubes.length; i++) {
    const tx = tubeX(i);
    const ty = TUBE_TOP - (selected === i ? LIFT : 0);
    if (x >= tx-4 && x <= tx+TUBE_W+4 && y >= ty-RIM_H && y <= ty+TUBE_H+4) {
      handleTubeClick(i); return;
    }
  }
}

canvas.addEventListener('click', e => { const p = getPos(e); onClick(p.x, p.y); });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const p = getPos(e); onClick(p.x, p.y);
}, { passive: false });

newGame();
</script>
</body>
</html>
