<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Sort</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #080814;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2vh;
    }
    h1 { font-size: 2.4vw; letter-spacing: 0.6vw; color: #44aaff; text-transform: uppercase; }
    #info { font-size: 1.1vw; color: #666; letter-spacing: 0.2vw; }
    #info span { color: #44aaff; font-weight: bold; }

    #tubes-container {
      display: flex;
      gap: 1.8vw;
      align-items: flex-end;
    }

    .tube-wrapper {
      display: flex; flex-direction: column; align-items: center;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .tube-wrapper.selected { transform: translateY(-2.5vh); }
    .tube-wrapper.shake { animation: shake 0.3s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .tube-rim {
      width: calc(6.5vw + 8px);
      height: 0.8vh;
      border: 2px solid rgba(255,255,255,0.22);
      border-bottom: none;
      border-radius: 4px 4px 0 0;
    }
    .tube-wrapper.selected .tube-rim { border-color: rgba(255,255,255,0.75); }

    .tube {
      width: 6.5vw;
      height: calc(4 * 6.5vw);
      border: 2px solid rgba(255,255,255,0.22);
      border-top: none;
      border-radius: 0 0 3.25vw 3.25vw;
      overflow: hidden;
      display: flex; flex-direction: column-reverse;
      background: rgba(255,255,255,0.03);
      position: relative;
    }
    .tube-wrapper.selected .tube {
      border-color: rgba(255,255,255,0.75);
      box-shadow: 0 0 1.5vw rgba(255,255,255,0.15);
    }

    .segment {
      width: 100%;
      height: 6.5vw;
      flex-shrink: 0;
    }

    #buttons { display: flex; gap: 1.2vw; }
    .btn {
      padding: 0.7vh 2vw;
      background: transparent;
      border: 2px solid #44aaff44;
      color: #44aaff99;
      border-radius: 4px;
      font-size: 0.85vw; letter-spacing: 0.15vw;
      cursor: pointer; text-transform: uppercase;
      transition: all 0.2s;
    }
    .btn:hover { border-color: #44aaff; color: #44aaff; background: #44aaff11; }

    #overlay {
      position: fixed; inset: 0;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 2vh; background: rgba(8,8,20,0.92);
      z-index: 10;
    }
    #overlay h2 { font-size: 4vw; letter-spacing: 0.5vw; color: #44aaff; }
    #overlay p { color: #aaa; font-size: 1.2vw; }
    #play-btn {
      padding: 1.2vh 3vw; background: #44aaff; color: #080814;
      border: none; border-radius: 4px;
      font-size: 1vw; font-weight: bold; letter-spacing: 0.3vw;
      cursor: pointer; text-transform: uppercase;
      transition: box-shadow 0.2s;
    }
    #play-btn:hover { box-shadow: 0 0 2vw #44aaff88; }
  </style>
</head>
<body>
  <h1>Water Sort</h1>
  <div id="info">Moves: <span id="moves">0</span></div>
  <div id="tubes-container"></div>
  <div id="buttons">
    <button class="btn" id="undo-btn">↩ Undo</button>
    <button class="btn" id="new-btn">New Game</button>
  </div>
  <div id="overlay">
    <h2>🎉 Solved!</h2>
    <p id="final-msg">Completed in 0 moves</p>
    <button id="play-btn">Play Again</button>
  </div>

<script>
const COLORS = { R: '#ff4466', B: '#4499ff', G: '#33ffaa', Y: '#ffdd33' };
const KEYS = ['R','B','G','Y'];
const CAP = 4;

let tubes = [], selected = -1, moves = 0, history = [];

function shuffle(a) {
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function newGame() {
  const segs = [];
  for (const k of KEYS) for (let i = 0; i < CAP; i++) segs.push(k);
  shuffle(segs);
  tubes = [];
  for (let i = 0; i < 4; i++) tubes.push(segs.slice(i*CAP, (i+1)*CAP));
  tubes.push([], []);
  selected = -1; moves = 0; history = [];
  document.getElementById('moves').textContent = 0;
  document.getElementById('overlay').style.display = 'none';
  render();
}

const top = t => t.length ? t[t.length-1] : null;

function topRun(t) {
  if (!t.length) return 0;
  const c = top(t); let n = 0;
  for (let i = t.length-1; i >= 0 && t[i] === c; i--) n++;
  return n;
}

function canPour(f, t) {
  if (f === t || !tubes[f].length) return false;
  if (tubes[t].length >= CAP) return false;
  return !tubes[t].length || top(tubes[f]) === top(tubes[t]);
}

function pour(f, t) {
  history.push(tubes.map(x => [...x]));
  const amt = Math.min(CAP - tubes[t].length, topRun(tubes[f]));
  for (let i = 0; i < amt; i++) tubes[t].push(tubes[f].pop());
  moves++;
  document.getElementById('moves').textContent = moves;
}

function undo() {
  if (!history.length) return;
  tubes = history.pop();
  moves = Math.max(0, moves-1);
  document.getElementById('moves').textContent = moves;
  selected = -1; render();
}

function isWon() {
  return tubes.every(t => !t.length || (t.length === CAP && t.every(c => c === t[0])));
}

function handleClick(i) {
  if (selected === -1) {
    if (!tubes[i].length) return;
    selected = i; render();
  } else if (selected === i) {
    selected = -1; render();
  } else if (canPour(selected, i)) {
    pour(selected, i);
    selected = -1; render();
    if (isWon()) setTimeout(() => {
      document.getElementById('final-msg').textContent = `Completed in ${moves} move${moves!==1?'s':''}`;
      document.getElementById('overlay').style.display = 'flex';
    }, 350);
  } else {
    selected = tubes[i].length ? i : -1;
    render();
  }
}

function render() {
  const c = document.getElementById('tubes-container');
  c.innerHTML = '';
  tubes.forEach((tube, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'tube-wrapper' + (selected === i ? ' selected' : '');
    wrap.onclick = () => handleClick(i);

    const rim = document.createElement('div');
    rim.className = 'tube-rim';

    const tubeEl = document.createElement('div');
    tubeEl.className = 'tube';
    const done = tube.length === CAP && tube.every(x => x === tube[0]);
    if (done) tubeEl.style.boxShadow = `0 0 1.5vw ${COLORS[tube[0]]}88`;

    tube.forEach(color => {
      const seg = document.createElement('div');
      seg.className = 'segment';
      seg.style.background = `linear-gradient(to bottom, ${COLORS[color]}ee, ${COLORS[color]}bb)`;
      tubeEl.appendChild(seg);
    });

    wrap.appendChild(rim);
    wrap.appendChild(tubeEl);
    c.appendChild(wrap);
  });
}

document.getElementById('undo-btn').onclick = undo;
document.getElementById('new-btn').onclick = newGame;
document.getElementById('play-btn').onclick = newGame;
newGame();
</script>
</body>
</html>
