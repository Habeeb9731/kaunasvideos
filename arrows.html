<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arrow Escape</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0d0d1f; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #wrapper { width: min(100vw, calc(100vh * 16/9)); height: min(100vh, calc(100vw * 9/16)); }
    canvas { width: 100%; height: 100%; display: block; cursor: pointer; }
  </style>
</head>
<body>
<div id="wrapper"><canvas id="c" width="960" height="540"></canvas></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 960, H = 540;

const U=0, R=1, D=2, L=3;
const DX=[0,1,0,-1], DY=[-1,0,1,0];
const ARR=['↑','→','↓','←'];

const CONFIGS=[{cols:6,rows:5},{cols:7,rows:5},{cols:8,rows:6},{cols:9,rows:6},{cols:10,rows:7}];

let lvlIdx=0, lives=3, gState='idle', level=null, ball=null, vis=null, moveT=0;
const SPEED=15;

function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];} }

function pathFind(cols,rows,sc,sr,ec,er){
  const seen=new Set([`${sc},${sr}`]);
  const p=[[sc,sr]];
  function dfs(c,r){
    if(c===ec&&r===er) return true;
    const ds=[[0,-1],[1,0],[0,1],[-1,0]]; shuffle(ds);
    for(const[dc,dr]of ds){
      const nc=c+dc,nr=r+dr;
      if(nc<0||nc>=cols||nr<0||nr>=rows) continue;
      const k=`${nc},${nr}`;
      if(seen.has(k)) continue;
      seen.add(k); p.push([nc,nr]);
      if(dfs(nc,nr)) return true;
      p.pop(); seen.delete(k);
    }
    return false;
  }
  return dfs(sc,sr)?p:null;
}

function sim(grid,cols,rows,sc,sr,ec,er){
  let c=sc,r=sr; const v=new Set();
  for(;;){
    if(c===ec&&r===er) return 'exit';
    const k=`${c},${r}`;
    if(v.has(k)) return 'loop';
    v.add(k);
    const dir=grid[r][c];
    const nc=c+DX[dir],nr=r+DY[dir];
    if(nc<0||nc>=cols||nr<0||nr>=rows) return 'oob';
    c=nc; r=nr;
  }
}

function buildLevel(cfg){
  const{cols,rows}=cfg;
  const ec=cols-1,er=0;
  for(let a=0;a<200;a++){
    const sc=0|Math.random()*Math.ceil(cols/2);
    const sr=(0|rows/2)+(0|Math.random()*Math.ceil(rows/2));
    if(sc===ec&&sr===er) continue;
    const path=pathFind(cols,rows,sc,sr,ec,er);
    if(!path||path.length<Math.ceil((cols+rows)/2)) continue;
    const grid=Array.from({length:rows},()=>Array.from({length:cols},()=>0|Math.random()*4));
    for(let i=0;i<path.length-1;i++){
      const[c,r]=path[i],[nc,nr]=path[i+1];
      const dc=nc-c,dr=nr-r;
      grid[r][c]= dc===1?R:dc===-1?L:dr===-1?U:D;
    }
    // count valid starts - reject if too many (puzzle too easy)
    let validCount=0;
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      if(c===ec&&r===er) continue;
      if(sim(grid,cols,rows,c,r,ec,er)==='exit') validCount++;
    }
    if(validCount<1||validCount>Math.ceil(cols*rows*0.3)) continue;
    return{cols,rows,grid,exit:[ec,er]};
  }
  // fallback: just return whatever
  const sc=0,sr=rows-1;
  const path=pathFind(cfg.cols,cfg.rows,sc,sr,ec,er);
  const grid=Array.from({length:cfg.rows},()=>Array.from({length:cfg.cols},()=>0|Math.random()*4));
  if(path) for(let i=0;i<path.length-1;i++){
    const[c,r]=path[i],[nc,nr]=path[i+1];
    grid[r][c]= nc-c===1?R:nc-c===-1?L:nr-r===-1?U:D;
  }
  return{cols:cfg.cols,rows:cfg.rows,grid,exit:[ec,er]};
}

function cs(){ return Math.min(Math.floor((W-130)/level.cols), Math.floor((H-90)/level.rows), 82); }
function go(){ const s=cs(); return{ox:Math.floor((W-level.cols*s)/2),oy:Math.floor((H-level.rows*s)/2)+14}; }

function initLevel(){
  level=buildLevel(CONFIGS[Math.min(lvlIdx,CONFIGS.length-1)]);
  ball=null; vis=null; gState='idle';
}

function startBall(c,r){
  const[ec,er]=level.exit;
  if(c===ec&&r===er) return;
  ball={c,r}; vis=Array.from({length:level.rows},()=>new Array(level.cols).fill(false));
  gState='moving'; moveT=0;
}

function tick(){
  if(gState!=='moving') return;
  if(++moveT<SPEED) return;
  moveT=0;
  const{c,r}=ball;
  const[ec,er]=level.exit;
  if(c===ec&&r===er){
    lvlIdx++;
    if(lvlIdx>=5){ gState='won'; return; }
    gState='levelup';
    setTimeout(initLevel,1800);
    return;
  }
  if(vis[r][c]){
    lives--;
    gState='died';
    setTimeout(()=>{ if(lives<=0){gState='gameover';}else{ball=null;vis=null;gState='idle';} },1300);
    return;
  }
  vis[r][c]=true;
  const dir=level.grid[r][c];
  const nc=c+DX[dir],nr=r+DY[dir];
  if(nc<0||nc>=level.cols||nr<0||nr>=level.rows){
    lives--;
    gState='died';
    setTimeout(()=>{ if(lives<=0){gState='gameover';}else{ball=null;vis=null;gState='idle';} },1300);
    return;
  }
  ball.c=nc; ball.r=nr;
}

function draw(){
  ctx.fillStyle='#0d0d1f'; ctx.fillRect(0,0,W,H);
  if(!level) return;
  const s=cs(); const{ox,oy}=go();
  const[ec,er]=level.exit;

  // Grid
  for(let r=0;r<level.rows;r++){
    for(let c=0;c<level.cols;c++){
      const x=ox+c*s, y=oy+r*s;
      const isE=c===ec&&r===er;
      const wasV=vis&&vis[r][c];
      ctx.fillStyle=isE?'#0a2818':wasV?'#141430':'#0f0f26';
      ctx.fillRect(x+1,y+1,s-2,s-2);
      ctx.strokeStyle=isE?'#1daa66':wasV?'#2233aa':'#1c1c45';
      ctx.lineWidth=1.5;
      ctx.strokeRect(x+1,y+1,s-2,s-2);
      ctx.textAlign='center'; ctx.textBaseline='middle';
      if(isE){
        ctx.fillStyle='#1daa66';
        ctx.font=`bold ${0|s*.52}px sans-serif`;
        ctx.fillText('★',x+s/2,y+s/2+1);
      } else {
        ctx.fillStyle=wasV?'#223388':'#5577ff';
        ctx.font=`bold ${0|s*.54}px sans-serif`;
        ctx.fillText(ARR[level.grid[r][c]],x+s/2,y+s/2+2);
      }
    }
  }

  // Ball
  if(ball&&gState!=='died'){
    const bx=ox+ball.c*s+s/2, by=oy+ball.r*s+s/2, br=s*.28;
    ctx.save();
    ctx.shadowBlur=22; ctx.shadowColor='#ffee44';
    ctx.fillStyle='#ffee44';
    ctx.beginPath(); ctx.arc(bx,by,br,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // HUD
  ctx.fillStyle='#556688'; ctx.font='bold 18px monospace';
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillText('LEVEL '+(lvlIdx+1)+' / 5', W/2, 10);
  ctx.font='25px sans-serif';
  const hw=34, hx=W/2-hw;
  for(let i=0;i<3;i++){
    ctx.fillStyle=i<lives?'#e94560':'#252535';
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('♥',hx+i*hw,8);
  }

  if(gState==='idle'){
    ctx.fillStyle='rgba(170,190,255,0.5)'; ctx.font='17px monospace';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText('tap any cell · ball follows arrows · reach ★ to win', W/2, H-12);
  }

  // Overlays
  if(['died','gameover','levelup','won'].includes(gState)){
    ctx.fillStyle='rgba(0,0,0,0.76)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    if(gState==='died'){
      ctx.fillStyle='#e94560'; ctx.font='bold 48px monospace';
      ctx.fillText(lives<=0?'NO LIVES!':'LOOP! -1 ♥',W/2,H/2-20);
      if(lives>0){ ctx.fillStyle='#888'; ctx.font='22px monospace'; ctx.fillText('try again…',W/2,H/2+34); }
    } else if(gState==='gameover'){
      ctx.fillStyle='#e94560'; ctx.font='bold 54px monospace'; ctx.fillText('GAME OVER',W/2,H/2-40);
      ctx.fillStyle='#aaa'; ctx.font='22px monospace'; ctx.fillText('tap to restart',W/2,H/2+34);
    } else if(gState==='levelup'){
      ctx.fillStyle='#1daa66'; ctx.font='bold 52px monospace'; ctx.fillText('LEVEL CLEAR ★',W/2,H/2);
    } else if(gState==='won'){
      ctx.fillStyle='#ffee44'; ctx.font='bold 54px monospace'; ctx.fillText('YOU WIN! 🎉',W/2,H/2-70);
      ctx.fillStyle='#aaa'; ctx.font='24px monospace'; ctx.fillText('The code is:',W/2,H/2+10);
      ctx.fillStyle='#fff'; ctx.font='bold 58px monospace'; ctx.fillText('mnwbq',W/2,H/2+80);
    }
  }
}

function handleInput(mx,my){
  if(gState==='gameover'){ lives=3; lvlIdx=0; initLevel(); return; }
  if(gState==='won') return;
  if(gState==='idle'){
    const s=cs(),{ox,oy}=go();
    const c=0|((mx-ox)/s), r=0|((my-oy)/s);
    if(c>=0&&c<level.cols&&r>=0&&r<level.rows) startBall(c,r);
  }
}

canvas.addEventListener('click',e=>{
  const rc=canvas.getBoundingClientRect();
  handleInput((e.clientX-rc.left)*W/rc.width,(e.clientY-rc.top)*H/rc.height);
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const rc=canvas.getBoundingClientRect(),t=e.touches[0];
  handleInput((t.clientX-rc.left)*W/rc.width,(t.clientY-rc.top)*H/rc.height);
},{passive:false});

function loop(){ tick(); draw(); requestAnimationFrame(loop); }
initLevel();
loop();
</script>
</body>
</html>
