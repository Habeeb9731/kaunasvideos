<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arrow Clear</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #wrapper { width: min(100vw, calc(100vh * 16/9)); height: min(100vh, calc(100vw * 9/16)); }
    canvas { width: 100%; height: 100%; display: block; cursor: pointer; background: transparent; }
  </style>
</head>
<body>
<div id="wrapper"><canvas id="c" width="960" height="540"></canvas></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 960, H = 540;

const U=0, R=1, D=2, L=3;
const DX=[0,1,0,-1], DY=[-1,0,1,0];
const ARR=['↑','→','↓','←'];

/*
  One hard level. Tap arrow → slides until blocked or flies off edge.
  Flies off = removed (good). Bumps into another arrow = lose a heart.
  Lose all 3 hearts = game over. Clear all arrows = win.

  Only ONE arrow can move at the start. Every other move costs a heart.
  Find the chain — there is exactly one correct order.
*/

const LEVEL = { cols:6, rows:6, arrows:[
  {c:5,r:0,d:L},  // only free arrow at start — find it
  {c:5,r:2,d:U},  // each arrow unblocks the next
  {c:3,r:2,d:R},
  {c:3,r:4,d:U},
  {c:1,r:4,d:R},
  {c:1,r:2,d:D},
  {c:0,r:2,d:R},
  {c:0,r:4,d:U},
  {c:0,r:5,d:U},
]};

let lives=3, gState='play';
let arrows=[], busy=false;
const ANIM_T=14;

function cs(){
  return Math.min(Math.floor((W-220)/LEVEL.cols), Math.floor((H-110)/LEVEL.rows), 96);
}
function go(){
  const s=cs();
  return { ox:Math.floor((W-LEVEL.cols*s)/2), oy:Math.floor((H-LEVEL.rows*s)/2)+14 };
}

function initLevel(){
  arrows=LEVEL.arrows.map(a=>({...a, anim:null, flash:0}));
  busy=false; gState='play';
}

function loseHeart(){
  lives--;
  if(lives<=0){ lives=0; gState='gameover'; }
}

function trySlide(idx){
  if(busy) return;
  const a=arrows[idx];
  const s=cs(); const{ox,oy}=go();

  let tc=a.c, tr=a.r;
  let fallsOff=false;
  for(;;){
    const nc=tc+DX[a.d], nr=tr+DY[a.d];
    if(nc<0||nc>=LEVEL.cols||nr<0||nr>=LEVEL.rows){ fallsOff=true; tc=nc; tr=nr; break; }
    if(arrows.some((b,bi)=>bi!==idx&&b.c===nc&&b.r===nr)) break;
    tc=nc; tr=nr;
  }

  if(tc===a.c&&tr===a.r){
    // immediately blocked — bump!
    a.flash=18;
    loseHeart();
    return;
  }

  if(!fallsOff){
    // moved but stopped by another arrow — bump!
    loseHeart();
  }

  busy=true;
  const extra = fallsOff ? s*1.2 : 0;
  a.anim={
    x0: ox+a.c*s+s/2, y0: oy+a.r*s+s/2,
    x1: ox+tc*s+s/2 + DX[a.d]*extra,
    y1: oy+tr*s+s/2 + DY[a.d]*extra,
    tc, tr, t:0, fallsOff
  };
}

function tick(){
  if(gState!=='play') return;
  arrows.forEach(a=>{ if(a.flash>0) a.flash--; });

  const done=[];
  arrows.forEach((a,i)=>{
    if(!a.anim) return;
    a.anim.t++;
    if(a.anim.t>=ANIM_T){
      if(a.anim.fallsOff) done.push(i);
      else{ a.c=a.anim.tc; a.r=a.anim.tr; a.anim=null; }
    }
  });
  for(let i=done.length-1;i>=0;i--) arrows.splice(done[i],1);
  busy=arrows.some(a=>a.anim);

  if(!busy&&arrows.length===0) gState='won';
}

function easeInOut(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }

function draw(){
  ctx.clearRect(0,0,W,H);
  const s=cs(); const{ox,oy}=go();

  // Grid
  for(let r=0;r<LEVEL.rows;r++) for(let c=0;c<LEVEL.cols;c++){
    const x=ox+c*s, y=oy+r*s;
    ctx.fillStyle='#fff'; ctx.fillRect(x+1,y+1,s-2,s-2);
    ctx.strokeStyle='#000'; ctx.lineWidth=1.5;
    ctx.strokeRect(x+1,y+1,s-2,s-2);
  }

  // Arrows (clipped)
  ctx.save();
  ctx.beginPath();
  ctx.rect(ox-s, oy-s, LEVEL.cols*s+2*s, LEVEL.rows*s+2*s);
  ctx.clip();

  arrows.forEach(a=>{
    let ax,ay;
    if(a.anim){
      const p=easeInOut(a.anim.t/ANIM_T);
      ax=a.anim.x0+(a.anim.x1-a.anim.x0)*p;
      ay=a.anim.y0+(a.anim.y1-a.anim.y0)*p;
    } else {
      ax=ox+a.c*s+s/2; ay=oy+a.r*s+s/2;
    }

    const fl=a.flash>0;
    const rad=s*0.38;
    ctx.save();
    ctx.fillStyle=fl?'#ff9999':'#fff';
    ctx.beginPath(); ctx.arc(ax,ay,rad,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=fl?'#cc0000':'#000'; ctx.lineWidth=fl?3:2.5; ctx.stroke();
    ctx.fillStyle=fl?'#cc0000':'#000';
    ctx.font=`bold ${Math.round(s*0.5)}px sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(ARR[a.d],ax,ay+2);
    ctx.restore();
  });
  ctx.restore();

  // HUD — title left, hearts right
  ctx.fillStyle='#000'; ctx.font='bold 18px monospace';
  ctx.textAlign='left'; ctx.textBaseline='top';
  ctx.fillText('ARROW PUZZLE', 20, 12);

  ctx.font='26px sans-serif';
  for(let i=0;i<3;i++){
    ctx.fillStyle=i<lives?'#cc0000':'#ccc';
    ctx.textAlign='center'; ctx.textBaseline='top';
    ctx.fillText('♥', W-90+i*34, 8);
  }

  // Hint
  if(gState==='play'){
    ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.font='15px monospace';
    ctx.textAlign='center'; ctx.textBaseline='bottom';
    ctx.fillText('tap arrow to slide · flies off edge = cleared · bumps = ♥ lost',W/2,H-10);
  }

  // Overlays
  if(gState==='gameover'||gState==='won'){
    ctx.fillStyle='rgba(255,255,255,0.88)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    if(gState==='gameover'){
      ctx.fillStyle='#cc0000'; ctx.font='bold 54px monospace'; ctx.fillText('GAME OVER',W/2,H/2-70);
      ctx.fillStyle='#444'; ctx.font='24px monospace'; ctx.fillText('The code is:',W/2,H/2+10);
      ctx.fillStyle='#cc0000'; ctx.font='bold 58px monospace'; ctx.fillText('9',W/2,H/2+80);
      ctx.fillStyle='#444'; ctx.font='18px monospace'; ctx.fillText('tap to try again',W/2,H/2+140);
    } else {
      ctx.fillStyle='#000'; ctx.font='bold 54px monospace'; ctx.fillText('YOU WIN!',W/2,H/2-70);
      ctx.fillStyle='#444'; ctx.font='24px monospace'; ctx.fillText('The code is:',W/2,H/2+10);
      ctx.fillStyle='#000'; ctx.font='bold 58px monospace'; ctx.fillText('6',W/2,H/2+80);
    }
  }
}

function handleInput(mx,my){
  if(gState==='gameover'){ lives=3; initLevel(); return; }
  if(gState!=='play'||busy) return;

  const s=cs(); const{ox,oy}=go();
  const c=Math.floor((mx-ox)/s), r=Math.floor((my-oy)/s);
  if(c<0||c>=LEVEL.cols||r<0||r>=LEVEL.rows) return;
  const idx=arrows.findIndex(a=>a.c===c&&a.r===r&&!a.anim);
  if(idx!==-1) trySlide(idx);
}

canvas.addEventListener('click',e=>{
  const rc=canvas.getBoundingClientRect();
  handleInput((e.clientX-rc.left)*W/rc.width,(e.clientY-rc.top)*H/rc.height);
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const rc=canvas.getBoundingClientRect(),t=e.touches[0];
  handleInput((t.clientX-rc.left)*W/rc.width,(t.clientY-rc.top)*H/rc.height);
},{passive:false});

function loop(){ tick(); draw(); requestAnimationFrame(loop); }
initLevel();
loop();
</script>
</body>
</html>
